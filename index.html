<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#2f8f9d">

<title>Katie's Noggin</title>

<link rel="manifest" href="manifest.json">
<link rel="icon" href="KC.png">

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
background-color:#e8f3f4;
margin:0;
padding:20px;
color:#1f2933;
}

.container{
max-width:560px;
margin:auto;
background:#ffffff;
padding:20px;
border-radius:16px;
box-shadow:0 6px 14px rgba(0,0,0,0.08);
}

h1,h2{
text-align:center;
color:#1f2933;
}

label{
display:block;
margin-top:12px;
margin-bottom:6px;
font-weight:600;
color:#374151;
}

input,textarea,select{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #d1d5db;
box-sizing:border-box;
font-size:16px;
background:#f9fafb;
color:#111827;
}

textarea{
min-height:80px;
resize:vertical;
}

button{
width:100%;
padding:15px;
margin-top:14px;
border:none;
border-radius:10px;
background:#2f8f9d;
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
}

button:hover{
background:#267681;
}

.secondary-btn{
background:#6b7280;
}

.secondary-btn:hover{
background:#4b5563;
}

.checkbox-group{
background:#f3f4f6;
border:1px solid #e5e7eb;
border-radius:10px;
padding:12px;
}

.checkbox-group label{
font-weight:normal;
display:block;
margin:6px 0;
}

.history{
margin-top:25px;
padding-top:20px;
border-top:1px solid #e5e7eb;
}

.entry{
background:#f9fafb;
border:1px solid #e5e7eb;
border-radius:10px;
padding:12px;
margin-top:12px;
}

.small{
color:#6b7280;
font-size:14px;
}

.log-box{
margin-top:10px;
padding:10px;
background:#ffffff;
border:1px solid #e5e7eb;
border-radius:8px;
}

.log-item{
padding:6px 0;
border-bottom:1px solid #eeeeee;
font-size:14px;
}

.log-item:last-child{
border-bottom:none;
}

.pill{
display:inline-block;
background:#dff1f3;
border-radius:999px;
padding:4px 10px;
font-size:12px;
margin:4px 6px 0 0;
color:#1f2933;
}

.doctor-image-preview{
margin-top:10px;
width:100%;
border-radius:10px;
border:1px solid #d1d5db;
display:none;
}

.footer-note{
margin-top:30px;
padding-top:16px;
border-top:1px solid #e5e7eb;
text-align:center;
font-size:15px;
color:#374151;
font-style:italic;
}

</style>
</head>

<body>

<div class="container">

<h1>Katie's Noggin</h1>

<label>Date</label>
<input type="date" id="date">

<label>Headache Type</label>
<select id="type">
<option value="Migraine">Migraine</option>
<option value="Headache">Headache</option>
<option value="Unsure">Unsure</option>
</select>

<label>Did you wake up with it?</label>
<select id="wake">
<option>No</option>
<option>Yes</option>
</select>

<label>Start Time</label>
<input type="time" id="start">

<label>End Time</label>
<input type="time" id="end">

<label>Severity (1-10)</label>
<input type="number" id="severity">

<label>Main Pain Area</label>
<select id="location">
<option>Temples</option>
<option>Behind eyes</option>
<option>Base of skull</option>
<option>Jaw / TMJ</option>
<option>Forehead</option>
<option>One side</option>
</select>

<label>Other Symptoms Worse Today</label>

<div class="checkbox-group">

<label><input type="checkbox" value="Dizziness" class="symptom"> Dizziness</label>
<label><input type="checkbox" value="Tinnitus" class="symptom"> Ringing in ears</label>
<label><input type="checkbox" value="Brain fog" class="symptom"> Brain fog</label>
<label><input type="checkbox" value="Fatigue" class="symptom"> Fatigue</label>
<label><input type="checkbox" value="Nausea" class="symptom"> Nausea</label>
<label><input type="checkbox" value="Neck pain" class="symptom"> Neck pain</label>
<label><input type="checkbox" value="TMJ pain" class="symptom"> Jaw / TMJ pain</label>
<label><input type="checkbox" value="Skin itching" class="symptom"> Skin itching</label>
<label><input type="checkbox" value="Light sensitivity" class="symptom"> Light sensitivity</label>

</div>

<label>Other Symptom</label>
<input type="text" id="otherSymptom">

<label>Notes</label>
<textarea id="notes"></textarea>

<label>Doctor Summary Photo</label>
<input type="file" id="doctorImage" accept="image/*">
<img id="doctorImagePreview" class="doctor-image-preview">

<button onclick="saveEntry()">Save / Update Entry</button>

<div class="history">

<h2>Saved Entries</h2>

<div id="entriesList" class="small">
No entries yet.
</div>

</div>

<div class="footer-note">
For my everything, you are all of it
</div>

</div>

<script>

function saveEntry(){

let symptoms=[]

document.querySelectorAll(".symptom:checked").forEach(function(box){
symptoms.push(box.value)
})

let entry={
date:document.getElementById("date").value,
type:document.getElementById("type").value,
wake:document.getElementById("wake").value,
start:document.getElementById("start").value,
end:document.getElementById("end").value,
severity:document.getElementById("severity").value,
location:document.getElementById("location").value,
symptoms:symptoms,
other:document.getElementById("otherSymptom").value,
notes:document.getElementById("notes").value
}

let entries=JSON.parse(localStorage.getItem("nogginData"))||[]

entries.unshift(entry)

localStorage.setItem("nogginData",JSON.stringify(entries))

alert("Entry Saved")

renderEntries()

}

function renderEntries(){

let entries=JSON.parse(localStorage.getItem("nogginData"))||[]

let list=document.getElementById("entriesList")

if(entries.length===0){
list.innerHTML="No entries yet."
return
}

list.innerHTML=entries.map(function(entry){

return `
<div class="entry">

<strong>${entry.date} — ${entry.type}</strong><br>

<span class="small">

Start: ${entry.start || "—"}<br>
End: ${entry.end || "—"}<br>
Severity: ${entry.severity || "—"}<br>
Location: ${entry.location || "—"}<br>

</span>

<div>

${(entry.symptoms||[]).map(symptom=>`<span class="pill">${symptom}</span>`).join("")}

</div>

<div class="small" style="margin-top:6px">
Notes: ${entry.notes || "—"}
</div>

</div>
`

}).join("")

}

renderEntries()

</script>

  <script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('./sw.js');
  });
}
</script>

</body>
</html>
